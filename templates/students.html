<!DOCTYPE html>
<html>
<head>
  <title>Students</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">
    <h2>EduTrack</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/students">Students</a>
    <a href="/attendance">Attendance</a>
    <a href="/marks">Internal Marks</a>
    <a href="/aai">AAI Calculator</a>
</div>

<div class="main">
    <h1>Students Management</h1>
    <p class="subtitle">Manage student records</p>

    <div class="panel">

        <form action="/add_student" method="POST" style="margin-bottom: 25px;">
            <input type="text" name="rollno" placeholder="Roll No" required>
            <input type="text" name="name" placeholder="Student Name" required>
            <input type="text" name="branch" placeholder="Class / Branch" required>
            <button type="submit">Add Student</button>
        </form>

        <input type="text" placeholder="Search Student..." style="width:300px;padding:12px;margin-bottom:20px;">

        <table>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Class / Branch</th>
                <th>Actions</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>
                    <a href="/edit_student/{{ student[0] }}">Edit</a>
                    <a href="/delete_student/{{ student[0] }}"
                       onclick="return confirm('Are you sure you want to delete this student?')">
                       Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>

    </div>
</div>

</body>
</html>
